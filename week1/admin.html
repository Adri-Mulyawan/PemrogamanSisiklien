<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - Mahasiswa</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-full bg-gray-100">

  <div class="flex h-full">
    <aside id="sidebar" class="bg-green-900 text-white h-full transition-all duration-300 w-20 lg:w-64">
      <div class="flex justify-between items-center p-4 border-b border-green-800">
        <span class="text-2xl font-bold hidden lg:block">Admin</span>
      </div>
      <nav class="p-4 space-y-2">
        <a href="#" class="flex items-center space-x-2 px-4 py-2 rounded hover:bg-green-700">
          <span class="text-lg">🏠</span>
          <span class="menu-text hidden lg:inline">Dashboard</span>
        </a>
        <a href="#" class="flex items-center space-x-2 px-4 py-2 rounded bg-green-800">
          <span class="text-lg">🎓</span>
          <span class="menu-text hidden lg:inline">Mahasiswa</span>
        </a>
      </nav>
    </aside>

    <div class="flex flex-col flex-1 overflow-hidden">
      
      <header class="bg-white shadow-md">
        <div class="flex justify-between items-center px-6 py-4">
          <h1 class="text-2xl font-semibold text-gray-800">Mahasiswa</h1>
          <div class="relative">
            <button onclick="toggleProfileMenu()" class="w-8 h-8 rounded-full bg-gray-300 focus:outline-none"></button>
            <div id="profileMenu" class="absolute right-0 mt-2 w-40 bg-white rounded-md shadow-lg py-2 hidden z-50">
              <a href="#" class="block px-4 py-2 text-gray-700 hover:bg-gray-100">Profile</a>
              <button onclick="logout()" class="w-full text-left px-4 py-2 text-gray-700 hover:bg-gray-100">Logout</button>
            </div>
          </div>
        </div>
      </header>

      <main class="flex-1 p-6 overflow-y-auto">
        <div class="bg-white shadow rounded-lg p-4">
          <div class="flex justify-between items-center mb-4">
            <h2 class="text-lg font-semibold">Daftar Mahasiswa</h2>
            <button onclick="openModal()" class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700">
              + Tambah Mahasiswa
            </button>
          </div>
          
          <div class="overflow-x-auto">
            <table class="w-full text-sm text-gray-700">
              <thead class="bg-green-700 text-white">
                <tr>
                  <th class="py-2 px-4 text-left">NIM</th>
                  <th class="py-2 px-4 text-left">Nama</th>
                  <th class="py-2 px-4 text-center">Aksi</th>
                </tr>
              </thead>
              <tbody>
                <tr class="even:bg-gray-100 odd:bg-white border-b">
                  <td class="py-2 px-4">20211002</td>
                  <td class="py-2 px-4">Adri Mulyawan</td>
                  <td class="py-2 px-4 text-center space-x-2">
                    <button class="bg-yellow-500 text-white px-2 py-1 rounded hover:bg-yellow-600" onclick="editMahasiswa(this)">Edit</button>
                    <button class="bg-red-500 text-white px-2 py-1 rounded hover:bg-red-600" onclick="deleteMahasiswa(this)">Hapus</button>
                  </td>
                </tr>
                <tr class="even:bg-gray-100 odd:bg-white border-b">
                  <td class="py-2 px-4">20211003</td>
                  <td class="py-2 px-4">Mulyawan</td>
                  <td class="py-2 px-4 text-center space-x-2">
                    <button class="bg-yellow-500 text-white px-2 py-1 rounded hover:bg-yellow-600" onclick="editMahasiswa(this)">Edit</button>
                    <button class="bg-red-500 text-white px-2 py-1 rounded hover:bg-red-600" onclick="deleteMahasiswa(this)">Hapus</button>
                  </td>
                </tr>
                <tr class="even:bg-gray-100 odd:bg-white border-b">
                  <td class="py-2 px-4">20211004</td>
                  <td class="py-2 px-4">Adri</td>
